name: Run My Shell Script
on: [push] # Запускать каждый раз, когда мы сохраняем изменения

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Эта команда "копирует" твои файлы на сервер

      - name: Run script
        run: |
          chmod +x test.sh
          ./test.sh
